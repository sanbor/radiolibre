name: LibreRadio
options:
  bundleIdPrefix: org.libreradio
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: "NO"

schemes:
  LibreRadio:
    build:
      targets:
        LibreRadio: all
    test:
      targets:
        - LibreRadioTests
      gatherCoverageData: true

targets:
  LibreRadio:
    type: application
    platform: iOS
    sources:
      - LibreRadio
    settings:
      base:
        INFOPLIST_FILE: LibreRadio/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.libreradio.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: LibreRadio/App/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true

  LibreRadioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LibreRadioTests
    dependencies:
      - target: LibreRadio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.libreradio.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/LibreRadio.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LibreRadio
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: true
