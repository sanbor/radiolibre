name: RadioLibre
options:
  bundleIdPrefix: com.radiolibre
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: "NO"

schemes:
  RadioLibre:
    build:
      targets:
        RadioLibre: all
        RadioLibreActivity: all
    test:
      targets:
        - RadioLibreTests
      gatherCoverageData: true

targets:
  RadioLibre:
    type: application
    platform: iOS
    sources:
      - RadioLibre
    dependencies:
      - target: RadioLibreActivity
    settings:
      base:
        INFOPLIST_FILE: RadioLibre/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.radiolibre.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: RadioLibre/App/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        NSSupportsLiveActivities: true
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsForMedia: true

  RadioLibreActivity:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "16.2"
    sources:
      - RadioLibreActivity
      - path: RadioLibre/Models/RadioActivityAttributes.swift
    settings:
      base:
        INFOPLIST_FILE: RadioLibreActivity/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.radiolibre.app.activity
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGNING_ALLOWED: "NO"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    info:
      path: RadioLibreActivity/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: RadioLibre
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  RadioLibreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RadioLibreTests
    dependencies:
      - target: RadioLibre
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.radiolibre.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/RadioLibre.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/RadioLibre
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: true
